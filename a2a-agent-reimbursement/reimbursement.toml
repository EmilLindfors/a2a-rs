# Reimbursement Agent Configuration

[agent]
name = "Reimbursement Agent"
description = "Intelligent expense reimbursement assistant that helps users submit and track reimbursement requests"
base_url = "http://localhost:8080"

# Agent skills are auto-discovered from the AgentPlugin implementation
# No need to specify them here!

[server]
http_port = 8080
ws_port = 8081

# Storage configuration
[server.storage]
type = "in_memory"  # or "sqlx" for persistent storage

# For SQLx storage:
# type = "sqlx"
# url = "${DATABASE_URL}"

# Authentication configuration (optional)
[server.auth]
type = "none"  # or "bearer_token" or "api_key"

# For bearer token auth:
# type = "bearer_token"
# tokens = ["${AUTH_TOKEN}"]
