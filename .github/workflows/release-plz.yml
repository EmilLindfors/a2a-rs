name: Release-plz

permissions:
  pull-requests: write
  contents: write

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  # Force Node 20-pinned JavaScript actions onto Node 24 (silences the
  # deprecation annotation until the actions update).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Standard release-plz flow with per-crate tags (see release-plz.toml):
#  - `release-plz-pr` keeps an open "release" PR with the pending version bumps
#    and changelog. Merging it lands the new versions on master.
#  - `release-plz-release` then publishes each crate whose version is ahead of
#    crates.io and pushes its `{package}-v{version}` tag.
jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    # Publish ONLY when the push is the merged "chore: release" PR (squash-merge
    # the release PR so the commit subject is the PR title), or on an explicit
    # manual dispatch. This is the release gate: ordinary pushes to master never
    # attempt a publish, so a half-finished workspace state or an accidental
    # hand-edited version bump on master can no longer auto-release. The actual
    # version bumps are owned by the release PR (release-plz-pr below).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.head_commit.message, 'chore: release')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks

      - name: Run release-plz (release)
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-semver-checks
        # Lets release-plz auto-detect breaking API changes and bump the minor
        # (0.x) without relying on `!`/`BREAKING CHANGE:` in commit messages.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks

      - name: Run release-plz (release-pr)
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
