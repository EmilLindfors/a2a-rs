# Agent with OAuth2 Client Credentials Flow
# This demonstrates machine-to-machine authentication without user interaction

[agent]
name = "Service-to-Service Agent"
description = "An agent using OAuth2 client credentials flow for M2M authentication"
version = "1.0.0"

[server]
host = "127.0.0.1"
http_port = 8080
ws_port = 8081

# SQLx storage for production use
[server.storage]
type = "sqlx"
url = "${DATABASE_URL}"
max_connections = 10

# OAuth2 Client Credentials Flow
[server.auth]
type = "oauth2"

# Client credentials
client_id = "${OAUTH_CLIENT_ID}"
client_secret = "${OAUTH_CLIENT_SECRET}"

# For client credentials flow, only token URL is needed
authorization_url = "http://localhost"  # Not used in client_credentials flow
token_url = "https://oauth.provider.com/oauth/token"

# Specify client credentials flow
flow = "client_credentials"

# Scopes for machine-to-machine access
scopes = ["api.read", "api.write"]

# Note: redirect_url is not needed for client_credentials flow

[[skills]]
id = "api_operation"
name = "API Operation"
description = "Performs API operations with service credentials"

[features]
streaming = true
push_notifications = true
state_history = true
