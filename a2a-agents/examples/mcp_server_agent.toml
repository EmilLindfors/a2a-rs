# Example A2A Agent Configuration with MCP Server Enabled
#
# This configuration exposes the agent as an MCP server via stdio,
# making it usable in Claude Desktop and other MCP clients.
#
# To use with Claude Desktop, add this to your claude_desktop_config.json:
# {
#   "mcpServers": {
#     "my-a2a-agent": {
#       "command": "cargo",
#       "args": ["run", "--example", "mcp_server_agent", "--features", "mcp-server"]
#     }
#   }
# }

[agent]
name = "Example A2A Agent"
description = "A simple example agent exposed as an MCP server"
version = "1.0.0"

[agent.provider]
name = "Example Provider"
url = "https://example.com"

[server]
host = "127.0.0.1"
http_port = 8080  # Not used in MCP mode, but required for URL generation
ws_port = 0  # Disable WebSocket

[server.storage]
type = "inmemory"

# Skills exposed by this agent (will become MCP tools)
[[skills]]
id = "greet"
name = "Greet User"
description = "Greets the user with a friendly message"
keywords = ["greeting", "hello", "welcome"]
examples = [
    "Hello, how are you?",
    "Greet me",
    "Say hi"
]
input_formats = ["text"]
output_formats = ["text"]

[[skills]]
id = "calculate"
name = "Simple Calculator"
description = "Performs basic arithmetic operations"
keywords = ["math", "calculate", "arithmetic"]
examples = [
    "What is 2 + 2?",
    "Calculate 10 * 5",
    "Add 15 and 27"
]
input_formats = ["text"]
output_formats = ["text"]

[[skills]]
id = "echo"
name = "Echo Message"
description = "Echoes back the user's message"
keywords = ["echo", "repeat", "mirror"]
examples = [
    "Echo: hello world",
    "Repeat this message"
]
input_formats = ["text"]
output_formats = ["text"]

[features]
streaming = true
push_notifications = false  # Not used in MCP mode
state_history = true
authenticated_card = false

# Enable MCP server mode
[features.mcp_server]
enabled = true
stdio = true  # Use stdio transport for Claude Desktop
